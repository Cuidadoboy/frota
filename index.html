<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#F26522">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="AeA Frota">
  <link rel="manifest" href="./manifest.json">
  <title>AeA — Gestão de Frota</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --orange:#F26522;--orange-dark:#d4551a;--blue:#1A3C5B;
      --green:#27ae60;--red:#e74c3c;--yellow:#f39c12;
      --card:#fff;--border:#e2e8f0;--text:#2d3748;--muted:#718096;
      --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
      --shadow-lg:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.05);
      --r:8px
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:var(--text);min-height:100vh}

    /* LOGIN */
    .overlay{position:fixed;inset:0;background:linear-gradient(135deg,#1A3C5B 0%,#F26522 100%);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
    .login-card{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:380px;box-shadow:var(--shadow-lg)}
    .login-logo{text-align:center;margin-bottom:1.5rem}
    .login-badge{display:inline-block;background:var(--orange);color:#fff;font-size:2rem;font-weight:900;padding:.4rem .9rem;border-radius:10px;letter-spacing:-1px;margin-bottom:.6rem}
    .login-logo h2{font-size:1.2rem;color:var(--blue);font-weight:700}
    .login-logo p{font-size:.78rem;color:var(--muted);margin-top:.2rem}
    .login-card input{width:100%;padding:.72rem 1rem;border:1.5px solid var(--border);border-radius:var(--r);font-size:.9rem;margin-bottom:.65rem;outline:none;transition:border-color .2s}
    .login-card input:focus{border-color:var(--orange)}

    /* HEADER */
    header{background:var(--blue);color:#fff;padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 4px rgba(0,0,0,.2)}
    .hd-left{display:flex;align-items:center;gap:.7rem}
    .logo-mark{background:var(--orange);color:#fff;font-weight:900;font-size:.95rem;padding:.28rem .5rem;border-radius:6px;letter-spacing:-.5px;flex-shrink:0}
    .app-name{font-weight:700;font-size:.95rem;display:block;line-height:1.2}
    .org-name{font-size:.68rem;color:rgba(255,255,255,.65);display:block}
    .user-badge{font-size:.72rem;background:rgba(255,255,255,.15);padding:.22rem .55rem;border-radius:99px}
    .btn-icon{background:none;border:none;color:#fff;font-size:1.1rem;cursor:pointer;padding:.3rem;border-radius:4px;line-height:1}
    .btn-icon:hover{background:rgba(255,255,255,.2)}

    /* NAV */
    nav{background:#fff;border-bottom:1px solid var(--border);display:flex;padding:0 .4rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .nav-btn{flex:none;padding:.6rem .7rem;border:none;background:none;cursor:pointer;color:var(--muted);font-size:.78rem;font-weight:600;border-bottom:2.5px solid transparent;transition:all .2s;display:flex;align-items:center;gap:.3rem;white-space:nowrap}
    .nav-btn.active{color:var(--orange);border-bottom-color:var(--orange)}
    .nav-btn:hover{color:var(--orange)}
    .badge{background:var(--red);color:#fff;font-size:.62rem;font-weight:700;padding:.1rem .32rem;border-radius:99px;min-width:1.15em;text-align:center}

    /* MAIN */
    main{max-width:960px;margin:0 auto;padding:1rem}
    .view{display:none}
    .view.active{display:block}
    .view-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;flex-wrap:wrap;gap:.5rem}
    .view-hd h2{font-size:1.1rem;font-weight:700;color:var(--blue)}
    .view-hd p{font-size:.82rem;color:var(--muted);margin-top:.1rem}
    .view-acts{display:flex;gap:.4rem;flex-wrap:wrap}

    /* CARDS */
    .card{background:var(--card);border-radius:var(--r);padding:1.2rem;box-shadow:var(--shadow);margin-bottom:1rem}

    /* FORMS */
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
    @media(max-width:580px){.form-grid{grid-template-columns:1fr}}
    .col2{grid-column:1/-1}
    .fg{display:flex;flex-direction:column;gap:.28rem}
    .fg label{font-size:.8rem;font-weight:600;color:var(--text)}
    .fg input,.fg select,.fg textarea{padding:.58rem .75rem;border:1.5px solid var(--border);border-radius:var(--r);font-size:.88rem;font-family:inherit;outline:none;transition:border-color .2s;background:#fff}
    .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--orange)}
    .fg textarea{resize:vertical}
    .form-acts{margin-top:1.1rem;display:flex;justify-content:flex-end;gap:.7rem}

    /* BUTTONS */
    .btn,.btn-outline,.btn-danger,.btn-sec{padding:.58rem 1.15rem;border-radius:var(--r);font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:.35rem;line-height:1.2}
    .btn{background:var(--orange);color:#fff}
    .btn:hover{background:var(--orange-dark)}
    .btn-sec{background:var(--blue);color:#fff}
    .btn-sec:hover{background:#152f47}
    .btn-outline{background:#fff;color:var(--text);border:1.5px solid var(--border)}
    .btn-outline:hover{border-color:var(--orange);color:var(--orange)}
    .btn-danger{background:var(--red);color:#fff}
    .btn-danger:hover{background:#c0392b}
    .btn-success{background:var(--green);color:#fff;padding:.58rem 1.15rem;border-radius:var(--r);font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:background .2s;display:inline-flex;align-items:center;gap:.35rem}
    .btn-success:hover{background:#219a52}
    .sm{padding:.33rem .65rem;font-size:.77rem}
    .full{width:100%;justify-content:center;margin-bottom:.45rem}

    /* MESSAGE */
    .msg{padding:.9rem 1rem;border-radius:var(--r);margin-top:.7rem;font-size:.87rem;font-weight:500}
    .msg.ok{background:#d4edda;color:#155724;border:1px solid #c3e6cb}
    .msg.err{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}

    /* FILTER TABS */
    .ftabs{display:flex;gap:.4rem;margin-bottom:.9rem;flex-wrap:wrap}
    .ftab{padding:.38rem .85rem;border-radius:99px;border:1.5px solid var(--border);background:#fff;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;color:var(--muted)}
    .ftab.active{background:var(--orange);color:#fff;border-color:var(--orange)}

    /* REQUEST CARDS */
    .rcard{background:var(--card);border-radius:var(--r);padding:.95rem 1.15rem;box-shadow:var(--shadow);margin-bottom:.7rem;border-left:4px solid var(--border)}
    .rcard.pending{border-left-color:var(--yellow)}
    .rcard.approved{border-left-color:var(--green)}
    .rcard.denied{border-left-color:var(--red)}
    .rcard-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;flex-wrap:wrap}
    .rcard-name{font-weight:700;font-size:.93rem}
    .rcard-meta{font-size:.76rem;color:var(--muted);margin-top:.15rem}
    .sbadge{font-size:.7rem;font-weight:700;padding:.22rem .55rem;border-radius:99px;white-space:nowrap;flex-shrink:0}
    .sbadge.pending{background:#fef3c7;color:#92400e}
    .sbadge.approved{background:#d1fae5;color:#065f46}
    .sbadge.denied{background:#fee2e2;color:#991b1b}
    .rcard-details{margin-top:.55rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:.35rem}
    .rcard-detail{font-size:.78rem;color:var(--muted)}
    .rcard-detail strong{color:var(--text);font-weight:600}
    .rcard-ft{margin-top:.65rem;display:flex;gap:.4rem;justify-content:flex-end;flex-wrap:wrap}

    /* PLAN */
    .tbl-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
    thead{background:var(--blue);color:#fff}
    th{padding:.7rem 1rem;text-align:left;font-size:.8rem;font-weight:600}
    td{padding:.65rem 1rem;font-size:.8rem;border-bottom:1px solid var(--border);vertical-align:top}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#f7fafc}
    .pcell{display:flex;flex-direction:column;gap:.25rem}
    .preq{background:#fff4ec;border:1px solid #fbd38d;border-radius:4px;padding:.28rem .45rem;font-size:.73rem;line-height:1.4}
    .preq.approved{background:#f0fff4;border-color:#9ae6b4}
    .week-lbl{font-weight:600;font-size:.87rem;color:var(--blue);padding:0 .4rem}

    /* FLEET */
    .fcard{background:var(--card);border-radius:var(--r);padding:.95rem 1.15rem;box-shadow:var(--shadow);margin-bottom:.7rem;display:flex;align-items:center;justify-content:space-between;gap:.9rem;flex-wrap:wrap}
    .fcard-info{display:flex;align-items:center;gap:.9rem;flex:1}
    .fcard-ico{font-size:1.9rem}
    .fcard-name{font-weight:700;font-size:.93rem}
    .fcard-plate{font-size:.77rem;color:var(--muted);font-family:monospace;background:#f7fafc;padding:.08rem .38rem;border-radius:4px;margin-top:.1rem;display:inline-block}
    .fcard-yr{font-size:.75rem;color:var(--muted)}
    .fstatus{font-size:.72rem;font-weight:700;padding:.28rem .65rem;border-radius:99px}
    .fstatus.available{background:#d1fae5;color:#065f46}
    .fstatus.in_use{background:#dbeafe;color:#1e40af}
    .fstatus.maintenance{background:#fee2e2;color:#991b1b}
    .fcard-acts{display:flex;gap:.4rem}

    /* MODAL */
    .modal{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
    .mbk{position:absolute;inset:0;background:rgba(0,0,0,.5)}
    .mcard{position:relative;background:#fff;border-radius:12px;width:100%;max-width:480px;box-shadow:var(--shadow-lg);z-index:1}
    .mhd{padding:1.1rem 1.2rem .7rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
    .mhd h3{font-size:1rem;font-weight:700;color:var(--blue)}
    .mbody{padding:1.1rem;display:flex;flex-direction:column;gap:.7rem;max-height:60vh;overflow-y:auto}
    .mft{padding:.7rem 1.2rem 1.1rem;display:flex;justify-content:flex-end;gap:.6rem;border-top:1px solid var(--border)}

    /* EMPTY */
    .empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
    .empty-ico{font-size:2.8rem;margin-bottom:.6rem}
    .empty p{font-size:.88rem}

    /* TOAST */
    #toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(100px);background:#2d3748;color:#fff;padding:.7rem 1.4rem;border-radius:99px;font-size:.85rem;z-index:999;transition:transform .3s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-lg)}
    #toast.show{transform:translateX(-50%) translateY(0)}

    /* SPINNER */
    .spin::after{content:'';display:inline-block;width:.75em;height:.75em;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:rotate .6s linear infinite;margin-left:.4em;vertical-align:middle}
    @keyframes rotate{to{transform:rotate(360deg)}}

    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginOverlay" class="overlay">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-badge">AeA</div>
      <h2>Gestão de Frota</h2>
      <p>Fundação Ayuda en Acción Moçambique</p>
    </div>
    <input type="email" id="loginEmail" placeholder="Email do gestor" autocomplete="email">
    <input type="password" id="loginPwd" placeholder="Senha" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-sec full" onclick="doLogin()">Entrar como Gestor</button>
    <button class="btn-outline full" style="margin-bottom:0" onclick="skipLogin()">Continuar como Utilizador</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="hd-left">
    <div class="logo-mark">AeA</div>
    <div>
      <span class="app-name">Gestão de Frota</span>
      <span class="org-name">Fundação Ayuda en Acción Moçambique</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:.5rem">
    <span id="userBadge" class="user-badge"></span>
    <button id="btnLogout" class="btn-icon" onclick="logout()" style="display:none" title="Terminar sessão">⏻</button>
  </div>
</header>

<!-- NAV -->
<nav>
  <button class="nav-btn active" id="navForm" onclick="showView('form')">📋 Requisição</button>
  <button class="nav-btn" id="navReqs" onclick="showView('reqs')" style="display:none">
    📂 Pedidos <span id="pendingBadge" class="badge" style="display:none">0</span>
  </button>
  <button class="nav-btn" id="navPlan" onclick="showView('plan')" style="display:none">📅 Plano Semanal</button>
  <button class="nav-btn" id="navFleet" onclick="showView('fleet')" style="display:none">🚗 Frota</button>
</nav>

<main>

  <!-- FORM VIEW -->
  <div id="viewForm" class="view active">
    <div class="view-hd">
      <div>
        <h2>Nova Requisição de Viatura</h2>
        <p>Preencha o formulário para solicitar uma viatura</p>
      </div>
    </div>
    <div class="card">
      <div class="form-grid">
        <div class="fg">
          <label>Nome do Requisitante *</label>
          <input type="text" id="fReq" placeholder="Nome completo">
        </div>
        <div class="fg">
          <label>Departamento *</label>
          <select id="fDept">
            <option value="">Seleccionar departamento</option>
            <option>Direcção</option>
            <option>Programas</option>
            <option>Finanças</option>
            <option>Recursos Humanos</option>
            <option>Administração</option>
            <option>Logística</option>
            <option>MEAL</option>
            <option>Comunicação</option>
            <option>Parceiros</option>
            <option>Outro</option>
          </select>
        </div>
        <div class="fg">
          <label>Data de Saída *</label>
          <input type="date" id="fDate">
        </div>
        <div class="fg">
          <label>Hora de Saída *</label>
          <input type="time" id="fTimeOut">
        </div>
        <div class="fg">
          <label>Hora de Regresso (estimada)</label>
          <input type="time" id="fTimeRet">
        </div>
        <div class="fg">
          <label>Destino *</label>
          <input type="text" id="fDest" placeholder="Local de destino">
        </div>
        <div class="fg col2">
          <label>Finalidade / Objectivo da Viagem *</label>
          <textarea id="fPurpose" rows="3" placeholder="Descreva o objectivo da viagem..."></textarea>
        </div>
        <div class="fg">
          <label>Km Estimados</label>
          <input type="number" id="fKm" placeholder="ex: 150" min="0">
        </div>
        <div class="fg">
          <label>Nº de Passageiros</label>
          <input type="number" id="fPax" placeholder="ex: 3" min="1" max="20">
        </div>
        <div class="fg col2">
          <label>Observações</label>
          <textarea id="fNotes" rows="2" placeholder="Informações adicionais..."></textarea>
        </div>
      </div>
      <div class="form-acts">
        <button class="btn" onclick="submitReq()">✔ Submeter Requisição</button>
      </div>
    </div>
    <div id="formMsg" style="display:none"></div>
  </div>

  <!-- REQUESTS VIEW -->
  <div id="viewReqs" class="view">
    <div class="view-hd">
      <h2>Gestão de Pedidos</h2>
      <div class="view-acts">
        <button class="btn-outline sm" onclick="pullFromCloud(event)">☁ Sincronizar</button>
        <button class="btn-outline sm" onclick="expPdf()">⬇ PDF</button>
        <button class="btn-outline sm" onclick="expXls()">⬇ Excel</button>
      </div>
    </div>
    <div class="ftabs">
      <button class="ftab active" onclick="filterReqs('all',this)">Todos</button>
      <button class="ftab" onclick="filterReqs('pending',this)">Pendentes</button>
      <button class="ftab" onclick="filterReqs('approved',this)">Aprovados</button>
      <button class="ftab" onclick="filterReqs('denied',this)">Recusados</button>
    </div>
    <div id="reqsList"></div>
  </div>

  <!-- PLAN VIEW -->
  <div id="viewPlan" class="view">
    <div class="view-hd">
      <h2>Plano Semanal</h2>
      <div class="view-acts">
        <button class="btn-outline sm" onclick="changeWeek(-1)">‹ Anterior</button>
        <span id="weekLabel" class="week-lbl"></span>
        <button class="btn-outline sm" onclick="changeWeek(1)">Próxima ›</button>
      </div>
    </div>
    <div id="planContent"></div>
  </div>

  <!-- FLEET VIEW -->
  <div id="viewFleet" class="view">
    <div class="view-hd">
      <h2>Gestão da Frota</h2>
      <button class="btn sm" onclick="openAddVehicle()">+ Adicionar Viatura</button>
    </div>
    <div id="fleetContent"></div>
  </div>

</main>

<!-- ASSIGN MODAL -->
<div id="assignModal" class="modal" style="display:none">
  <div class="mbk" onclick="closeAssign()"></div>
  <div class="mcard">
    <div class="mhd">
      <h3>Atribuir Viatura</h3>
      <button class="btn-icon" onclick="closeAssign()" style="color:var(--text)">✕</button>
    </div>
    <div class="mbody">
      <div class="fg"><label>Viatura *</label><select id="aVehicle"></select></div>
      <div class="fg"><label>Motorista</label><input type="text" id="aDriver" placeholder="Nome do motorista"></div>
      <div class="fg"><label>Hora de Saída</label><input type="time" id="aDeptTime"></div>
      <div class="fg"><label>Hora de Regresso</label><input type="time" id="aRetTime"></div>
      <div class="fg"><label>Observações do Gestor</label><textarea id="aNotes" rows="2" placeholder="Instruções ou observações..."></textarea></div>
    </div>
    <div class="mft">
      <button class="btn-danger" onclick="denyReq()">✕ Recusar</button>
      <button class="btn-success" onclick="saveAssign()">✔ Aprovar &amp; Atribuir</button>
    </div>
  </div>
</div>

<!-- VEHICLE MODAL -->
<div id="vehicleModal" class="modal" style="display:none">
  <div class="mbk" onclick="closeVehicle()"></div>
  <div class="mcard">
    <div class="mhd">
      <h3 id="vModalTitle">Nova Viatura</h3>
      <button class="btn-icon" onclick="closeVehicle()" style="color:var(--text)">✕</button>
    </div>
    <div class="mbody">
      <div class="fg"><label>Matrícula *</label><input type="text" id="vPlate" placeholder="ex: MPC-0001"></div>
      <div class="fg"><label>Marca *</label><input type="text" id="vMake" placeholder="ex: Toyota"></div>
      <div class="fg"><label>Modelo *</label><input type="text" id="vModel" placeholder="ex: Hilux"></div>
      <div class="fg"><label>Ano</label><input type="number" id="vYear" placeholder="ex: 2020" min="1990" max="2030"></div>
      <div class="fg">
        <label>Estado</label>
        <select id="vStatus">
          <option value="available">Disponível</option>
          <option value="in_use">Em uso</option>
          <option value="maintenance">Em manutenção</option>
        </select>
      </div>
    </div>
    <div class="mft">
      <button class="btn-outline" onclick="closeVehicle()">Cancelar</button>
      <button class="btn" onclick="saveVehicle()">Guardar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycby1x3v9H2J6RTMjXCUwVJhwJw4lsFOo8fC6Jasu1JcfRXSrPfkyfghvz46bguwabwr1aA/exec';
const KEY_R  = 'aea_reqs_v1';
const KEY_F  = 'aea_fleet_v1';
const KEY_S  = 'aea_sess_v2';
const KEY_LK = 'aea_lock';
const MGR_EM = 'emoniz@ayudaenaccion.org';
const SESSION_MS = 30 * 60 * 1000;
const WARN_MS    =  2 * 60 * 1000;
const MAX_FAIL   = 5;
const LOCK_MS    =  5 * 60 * 1000;

let reqs = [], fleet = [], isManager = false;
let curFilter = 'all', weekOffset = 0, editVId = null, assignId = null;
let _mh = null;

(async () => {
  const pw = [65,101,65,64,50,48,50,51].map(c => String.fromCharCode(c)).join('');
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(MGR_EM + ':' + pw));
  _mh = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
})();

/* ── SESSION ──────────────────────────────────────── */
function sessCreate(role) {
  const tok = typeof crypto.randomUUID === 'function'
    ? crypto.randomUUID()
    : Math.random().toString(36).slice(2) + Date.now().toString(36);
  sessionStorage.setItem(KEY_S, JSON.stringify({tok, role, ts: Date.now()}));
}

function sessGet() {
  try {
    const s = JSON.parse(sessionStorage.getItem(KEY_S));
    if (!s) return null;
    if (s.role === 'manager' && Date.now() - s.ts > SESSION_MS) {
      sessionStorage.removeItem(KEY_S); return null;
    }
    return s;
  } catch { return null; }
}

function sessTouch() {
  try {
    const s = JSON.parse(sessionStorage.getItem(KEY_S));
    if (s) { s.ts = Date.now(); sessionStorage.setItem(KEY_S, JSON.stringify(s)); }
  } catch {}
}

function sessClear() { sessionStorage.removeItem(KEY_S); }

/* ── LOCKOUT ──────────────────────────────────────── */
function lockGet()    { try { return JSON.parse(localStorage.getItem(KEY_LK)) || {n:0,until:0}; } catch { return {n:0,until:0}; } }
function lockActive() { const l = lockGet(); return l.until > Date.now() ? l : null; }
function lockRecord() {
  const l = lockGet(); l.n++;
  if (l.n >= MAX_FAIL) { l.until = Date.now() + LOCK_MS; l.n = 0; }
  localStorage.setItem(KEY_LK, JSON.stringify(l));
  return Math.max(0, MAX_FAIL - l.n);
}
function lockClear() { localStorage.removeItem(KEY_LK); }

/* ── INIT ─────────────────────────────────────────── */
function init() {
  reqs  = JSON.parse(localStorage.getItem(KEY_R) || '[]');
  fleet = JSON.parse(localStorage.getItem(KEY_F) || 'null') || defFleet();
  document.getElementById('fDate').value = today();
  const s = sessGet();
  if (s?.role === 'manager') { isManager = true; activateMgr(); hideLogin(); }
  else if (s?.role === 'user') hideLogin();
  setInterval(checkSessExpiry, 60000);
}

function hideLogin() { document.getElementById('loginOverlay').style.display = 'none'; }

function checkSessExpiry() {
  if (!isManager) return;
  const s = sessGet();
  if (!s) { toast('Sessão expirada. A terminar...'); setTimeout(logout, 2000); return; }
  const rem = SESSION_MS - (Date.now() - s.ts);
  if (rem < WARN_MS) toast(`Sessão expira em ${Math.ceil(rem/60000)} min. Clique em qualquer botão para renovar.`);
}

function defFleet() {
  return [
    {id:'v1',plate:'MPC-0001',make:'Toyota', model:'Hilux',    year:2020,status:'available'},
    {id:'v2',plate:'MPC-0002',make:'Mazda',  model:'BT-50',    year:2019,status:'available'},
    {id:'v3',plate:'MPC-0003',make:'Nissan', model:'Hard Body',year:2018,status:'available'},
    {id:'v4',plate:'MPC-0004',make:'Toyota', model:'Hilux',    year:2021,status:'available'},
    {id:'v5',plate:'MPC-0005',make:'ISUZU',  model:'D-Max',    year:2020,status:'available'},
  ];
}

function save() {
  localStorage.setItem(KEY_R, JSON.stringify(reqs));
  localStorage.setItem(KEY_F, JSON.stringify(fleet));
}

/* ── AUTH ─────────────────────────────────────────── */
async function doLogin() {
  const lk = lockActive();
  if (lk) {
    loginErr(`Conta bloqueada. Aguarde ${Math.ceil((lk.until - Date.now()) / 60000)} minuto(s).`); return;
  }
  const em = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pw = document.getElementById('loginPwd').value;
  if (!em || !pw) { loginErr('Preencha o email e a senha.'); return; }
  if (!_mh) { loginErr('A inicializar segurança... tente novamente.'); return; }

  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(em + ':' + pw));
  const h = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');

  if (em === MGR_EM && h === _mh) {
    lockClear();
    sessCreate('manager');
    isManager = true; activateMgr(); hideLogin();
    toast('Bem-vindo, Gestor!');
  } else {
    const rem = lockRecord();
    loginErr(rem > 0
      ? `Email ou senha incorrectos. ${rem} tentativa(s) restante(s).`
      : 'Demasiadas tentativas. Conta bloqueada por 5 minutos.');
  }
}

function loginErr(msg) {
  let el = document.getElementById('loginErr');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loginErr'; el.className = 'msg err';
    el.style.cssText = 'margin-top:.5rem;margin-bottom:0';
    document.querySelector('.login-card').appendChild(el);
  }
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

function skipLogin() {
  sessCreate('user');
  hideLogin();
}

function logout() {
  sessClear();
  isManager = false;
  deactivateMgr();
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPwd').value = '';
}

function activateMgr() {
  document.getElementById('userBadge').textContent = '👤 Gestor';
  document.getElementById('btnLogout').style.display = '';
  ['navReqs','navPlan','navFleet'].forEach(id => document.getElementById(id).style.display = '');
  updBadge();
}

function deactivateMgr() {
  document.getElementById('userBadge').textContent = '';
  document.getElementById('btnLogout').style.display = 'none';
  ['navReqs','navPlan','navFleet'].forEach(id => document.getElementById(id).style.display = 'none');
  showView('form');
}

/* ── NAV ──────────────────────────────────────────── */
function showView(v) {
  sessTouch();
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  const vId = 'view' + v[0].toUpperCase() + v.slice(1);
  const nId = 'nav'  + v[0].toUpperCase() + v.slice(1);
  document.getElementById(vId).classList.add('active');
  document.getElementById(nId).classList.add('active');
  if (v === 'reqs')  renderReqs();
  if (v === 'plan')  renderPlan();
  if (v === 'fleet') renderFleet();
}

/* ── FORM ─────────────────────────────────────────── */
function submitReq() {
  const fReq  = v('fReq'), fDept = v('fDept'), fDate = v('fDate');
  const fTOut = v('fTimeOut'), fDest = v('fDest'), fPurp = v('fPurpose');
  if (!fReq || !fDept || !fDate || !fTOut || !fDest || !fPurp) {
    showFMsg('Por favor, preencha todos os campos obrigatórios (*).', 'err'); return;
  }
  const r = {
    id: Date.now().toString(),
    requester: fReq, dept: fDept, date: fDate,
    timeOut: fTOut, timeRet: v('fTimeRet'),
    destination: fDest, purpose: fPurp,
    km: v('fKm'), passengers: v('fPax'), notes: v('fNotes'),
    status: 'pending', vehicle: null, vehicleName: null,
    driver: null, deptTime: null, retTime: null, mgrNotes: null,
    createdAt: Date.now()
  };
  reqs.push(r); save(); pushReq(r);
  clearForm();
  showFMsg('Requisição submetida com sucesso! Aguarde aprovação do gestor.', 'ok');
  updBadge();
}

function clearForm() {
  ['fReq','fDept','fTimeOut','fTimeRet','fDest','fPurpose','fKm','fPax','fNotes']
    .forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('fDate').value = today();
}

function showFMsg(msg, cls) {
  const el = document.getElementById('formMsg');
  el.textContent = msg; el.className = 'msg ' + cls; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

/* ── CLOUD SYNC ───────────────────────────────────── */
function pushReq(r) {
  fetch(GAS, {method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({action:'addReq', data:r})}).catch(()=>{});
}

function pullFromCloud(e) {
  const btn = e && e.target;
  if (btn) btn.classList.add('spin');
  fetch(GAS + '?action=getReqs')
    .then(r => r.json())
    .then(data => {
      if (!Array.isArray(data) || !data.length) { toast('Nenhum dado novo na nuvem.'); return; }
      const map = {}; reqs.forEach(r => map[r.id] = r); data.forEach(r => map[r.id] = r);
      reqs = Object.values(map).sort((a,b) => b.createdAt - a.createdAt);
      save(); renderReqs(); updBadge(); toast('Sincronizado com sucesso!');
    })
    .catch(() => toast('Não foi possível sincronizar. Verifique a ligação.'))
    .finally(() => { if (btn) btn.classList.remove('spin'); });
}

/* ── REQUESTS ─────────────────────────────────────── */
const SL = {pending:'Pendente', approved:'Aprovado', denied:'Recusado'};

function filterReqs(f, btn) {
  curFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderReqs();
}

function renderReqs() {
  let list = [...reqs].sort((a,b) => b.createdAt - a.createdAt);
  if (curFilter !== 'all') list = list.filter(r => r.status === curFilter);
  const el = document.getElementById('reqsList');
  if (!list.length) { el.innerHTML = '<div class="empty"><div class="empty-ico">📭</div><p>Nenhum pedido encontrado.</p></div>'; return; }
  el.innerHTML = list.map(r => {
    const vn = r.vehicleName ? esc(r.vehicleName) : '<em>—</em>';
    const dr = r.driver ? esc(r.driver) : '<em>—</em>';
    const btns = r.status === 'pending'
      ? `<button class="btn-success sm" onclick="openAssign('${r.id}')">Atribuir</button>
         <button class="btn-danger sm" onclick="quickDeny('${r.id}')">Recusar</button>`
      : r.status === 'approved'
        ? `<button class="btn-outline sm" onclick="openAssign('${r.id}')">Editar Atribuição</button>` : '';
    return `<div class="rcard ${r.status}">
      <div class="rcard-hd">
        <div><div class="rcard-name">${esc(r.requester)}</div>
          <div class="rcard-meta">${esc(r.dept)} · ${fmtD(r.date)}</div></div>
        <span class="sbadge ${r.status}">${SL[r.status]||r.status}</span>
      </div>
      <div class="rcard-details">
        <div class="rcard-detail"><strong>Destino:</strong> ${esc(r.destination)}</div>
        <div class="rcard-detail"><strong>Finalidade:</strong> ${esc(r.purpose)}</div>
        <div class="rcard-detail"><strong>Saída:</strong> ${r.timeOut||'—'}</div>
        <div class="rcard-detail"><strong>Regresso:</strong> ${r.timeRet||'—'}</div>
        <div class="rcard-detail"><strong>Km:</strong> ${r.km||'—'}</div>
        <div class="rcard-detail"><strong>Passageiros:</strong> ${r.passengers||'—'}</div>
        <div class="rcard-detail"><strong>Viatura:</strong> ${vn}</div>
        <div class="rcard-detail"><strong>Motorista:</strong> ${dr}</div>
        ${r.notes?`<div class="rcard-detail" style="grid-column:1/-1"><strong>Obs:</strong> ${esc(r.notes)}</div>`:''}
        ${r.mgrNotes?`<div class="rcard-detail" style="grid-column:1/-1"><strong>Obs. Gestor:</strong> ${esc(r.mgrNotes)}</div>`:''}
      </div>
      ${btns ? `<div class="rcard-ft">${btns}</div>` : ''}
    </div>`;
  }).join('');
}

function updBadge() {
  if (!isManager) return;
  const n = reqs.filter(r => r.status === 'pending').length;
  const b = document.getElementById('pendingBadge');
  b.textContent = n; b.style.display = n > 0 ? '' : 'none';
}

/* ── ASSIGN ───────────────────────────────────────── */
function openAssign(id) {
  assignId = id;
  const r = reqs.find(x => x.id === id); if (!r) return;
  const sel = document.getElementById('aVehicle');
  sel.innerHTML = '<option value="">— Seleccionar viatura —</option>' +
    fleet.filter(v => v.status === 'available' || v.id === r.vehicle)
      .map(v => `<option value="${v.id}"${v.id===r.vehicle?' selected':''}>${v.make} ${v.model} (${v.plate})</option>`).join('');
  document.getElementById('aDriver').value   = r.driver   || '';
  document.getElementById('aDeptTime').value = r.deptTime || r.timeOut  || '';
  document.getElementById('aRetTime').value  = r.retTime  || r.timeRet  || '';
  document.getElementById('aNotes').value    = r.mgrNotes || '';
  document.getElementById('assignModal').style.display = 'flex';
}

function closeAssign() { document.getElementById('assignModal').style.display = 'none'; assignId = null; }

function saveAssign() {
  const vid = document.getElementById('aVehicle').value;
  if (!vid) { toast('Seleccione uma viatura.'); return; }
  const idx = reqs.findIndex(r => r.id === assignId); if (idx === -1) return;
  const veh = fleet.find(f => f.id === vid);
  reqs[idx] = { ...reqs[idx], status:'approved', vehicle:vid,
    vehicleName: veh ? `${veh.make} ${veh.model} (${veh.plate})` : vid,
    driver: document.getElementById('aDriver').value.trim(),
    deptTime: document.getElementById('aDeptTime').value,
    retTime:  document.getElementById('aRetTime').value,
    mgrNotes: document.getElementById('aNotes').value.trim() };
  save(); closeAssign(); renderReqs(); updBadge(); pushReq(reqs[idx]); toast('Viatura atribuída com sucesso!');
}

function quickDeny(id) {
  if (!confirm('Recusar este pedido?')) return;
  const idx = reqs.findIndex(r => r.id === id); if (idx === -1) return;
  reqs[idx].status = 'denied'; save(); renderReqs(); updBadge(); pushReq(reqs[idx]); toast('Pedido recusado.');
}

function denyReq() {
  if (!assignId || !confirm('Recusar este pedido?')) return;
  const idx = reqs.findIndex(r => r.id === assignId); if (idx === -1) return;
  reqs[idx].status = 'denied';
  reqs[idx].mgrNotes = document.getElementById('aNotes').value.trim();
  save(); closeAssign(); renderReqs(); updBadge(); pushReq(reqs[idx]); toast('Pedido recusado.');
}

/* ── PLAN ─────────────────────────────────────────── */
const DAYS = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];

function getWeekDates(off) {
  const now = new Date(), dow = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() + (dow === 0 ? -6 : 1 - dow) + off * 7);
  return Array.from({length:7}, (_,i) => { const d = new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

function changeWeek(d) { weekOffset += d; renderPlan(); }

function renderPlan() {
  const dates = getWeekDates(weekOffset);
  const s = dates[0], e = dates[6];
  document.getElementById('weekLabel').textContent =
    `${s.getDate()}/${s.getMonth()+1} – ${e.getDate()}/${e.getMonth()+1}/${e.getFullYear()}`;
  const todayStr = today();
  const approved = reqs.filter(r => r.status === 'approved');
  const rows = dates.map((d,i) => {
    const ds = d.toISOString().slice(0,10);
    const dayR = approved.filter(r => r.date === ds);
    const cells = dayR.length
      ? dayR.map(r => `<div class="preq approved">
          <strong>${esc(r.requester)}</strong><br>
          ${esc(r.destination)}<br>
          ${r.vehicleName?'🚗 '+esc(r.vehicleName)+'<br>':''}
          ${r.deptTime?'⏰ '+r.deptTime:''}
        </div>`).join('')
      : '<span style="color:var(--muted);font-size:.72rem">—</span>';
    const hl = ds === todayStr ? 'style="background:#fffbf5"' : '';
    const tc = ds === todayStr ? 'style="color:var(--orange)"' : '';
    return `<tr ${hl}><td style="white-space:nowrap;font-weight:600" ${tc}>
        ${DAYS[i]}<br><span style="font-size:.72rem;font-weight:400;color:var(--muted)">${d.getDate()}/${d.getMonth()+1}</span>
      </td><td><div class="pcell">${cells}</div></td></tr>`;
  }).join('');
  document.getElementById('planContent').innerHTML =
    `<div class="tbl-wrap"><table><thead><tr><th>Dia</th><th>Deslocações Aprovadas</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ── FLEET ────────────────────────────────────────── */
const FSL = {available:'Disponível', in_use:'Em uso', maintenance:'Em manutenção'};

function renderFleet() {
  const c = document.getElementById('fleetContent');
  if (!fleet.length) { c.innerHTML = '<div class="empty"><div class="empty-ico">🚗</div><p>Nenhuma viatura registada.</p></div>'; return; }
  c.innerHTML = fleet.map(v => `
    <div class="fcard">
      <div class="fcard-info">
        <div class="fcard-ico">🚙</div>
        <div>
          <div class="fcard-name">${esc(v.make)} ${esc(v.model)}</div>
          <div class="fcard-plate">${esc(v.plate)}</div>
          <div class="fcard-yr">${v.year||'—'}</div>
        </div>
      </div>
      <span class="fstatus ${v.status}">${FSL[v.status]||v.status}</span>
      <div class="fcard-acts">
        <button class="btn-outline sm" onclick="openEditVehicle('${v.id}')">Editar</button>
        <button class="btn-danger sm" onclick="deleteVehicle('${v.id}')">Remover</button>
      </div>
    </div>`).join('');
}

function openAddVehicle() {
  editVId = null;
  document.getElementById('vModalTitle').textContent = 'Nova Viatura';
  ['vPlate','vMake','vModel','vYear'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('vStatus').value = 'available';
  document.getElementById('vehicleModal').style.display = 'flex';
}

function openEditVehicle(id) {
  const v = fleet.find(f => f.id === id); if (!v) return;
  editVId = id;
  document.getElementById('vModalTitle').textContent = 'Editar Viatura';
  document.getElementById('vPlate').value  = v.plate;
  document.getElementById('vMake').value   = v.make;
  document.getElementById('vModel').value  = v.model;
  document.getElementById('vYear').value   = v.year || '';
  document.getElementById('vStatus').value = v.status;
  document.getElementById('vehicleModal').style.display = 'flex';
}

function closeVehicle() { document.getElementById('vehicleModal').style.display = 'none'; editVId = null; }

function saveVehicle() {
  const plate = v('vPlate'), make = v('vMake'), model = v('vModel');
  if (!plate||!make||!model) { toast('Preencha matrícula, marca e modelo.'); return; }
  const veh = {id: editVId || 'v'+Date.now(), plate, make, model,
    year: parseInt(v('vYear'))||null, status: v('vStatus')};
  if (editVId) { const i = fleet.findIndex(f => f.id === editVId); if (i !== -1) fleet[i] = veh; }
  else fleet.push(veh);
  save(); closeVehicle(); renderFleet(); toast(editVId ? 'Viatura actualizada.' : 'Viatura adicionada.');
}

function deleteVehicle(id) {
  if (!confirm('Remover esta viatura da frota?')) return;
  fleet = fleet.filter(f => f.id !== id); save(); renderFleet(); toast('Viatura removida.');
}

/* ── EXPORT ───────────────────────────────────────── */
function expPdf() {
  if (!window.jspdf) { toast('Biblioteca PDF não carregada.'); return; }
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'landscape'});
  doc.setFontSize(13); doc.setTextColor(26,60,91);
  doc.text('AeA — Requisições de Viatura', 14, 14);
  doc.setFontSize(8); doc.setTextColor(120);
  doc.text(`Fundação Ayuda en Acción Moçambique  ·  ${new Date().toLocaleDateString('pt')}`, 14, 20);
  doc.autoTable({
    startY: 24,
    head:[['Requisitante','Dept.','Data','Destino','Finalidade','Km','Pax','Estado','Viatura','Motorista']],
    body: reqs.map(r => [r.requester,r.dept,fmtD(r.date),r.destination,r.purpose,
      r.km||'—',r.passengers||'—',SL[r.status]||r.status,r.vehicleName||'—',r.driver||'—']),
    styles:{fontSize:7,cellPadding:1.8},
    headStyles:{fillColor:[26,60,91],textColor:255},
    alternateRowStyles:{fillColor:[245,247,250]}
  });
  doc.save(`AeA_Requisicoes_${today()}.pdf`);
}

function expXls() {
  if (!window.XLSX) { toast('Biblioteca Excel não carregada.'); return; }
  const rows = [
    ['Requisitante','Departamento','Data','Hora Saída','Hora Regresso','Destino','Finalidade',
     'Km','Passageiros','Estado','Viatura','Motorista','Observações','Obs. Gestor']
  ].concat(reqs.map(r => [r.requester,r.dept,r.date,r.timeOut||'',r.timeRet||'',
    r.destination,r.purpose,r.km||'',r.passengers||'',SL[r.status]||r.status,
    r.vehicleName||'',r.driver||'',r.notes||'',r.mgrNotes||'']));
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = rows[0].map(() => ({wch:18}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Requisições');
  XLSX.writeFile(wb, `AeA_Requisicoes_${today()}.xlsx`);
}

/* ── UTILS ────────────────────────────────────────── */
function v(id)     { return document.getElementById(id).value.trim(); }
function esc(s)    { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
function today()   { return new Date().toISOString().slice(0,10); }
function fmtD(d)   { if (!d) return '—'; const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; }

let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 3000);
}

/* ── SERVICE WORKER ───────────────────────────────── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}

init();
</script>
